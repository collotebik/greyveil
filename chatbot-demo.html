<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Greyveil AI Assistant — Demo</title>
<link href="https://fonts.googleapis.com/css2?family=Big+Shoulders+Display:wght@700;900&family=Unbounded:wght@300;400&family=Barlow:wght@300;400&display=swap" rel="stylesheet"/>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --black:      #212123;
    --grey-dark:  #2a2a2d;
    --grey-mid:   #363639;
    --grey-pale:  #b8b8c4;
    --white:      #f4f4f6;
    --accent:     #45aac1;
    --accent-dim: rgba(69,170,193,0.12);
  }

  body {
    background: var(--black);
    color: var(--white);
    font-family: 'Barlow', sans-serif;
    font-weight: 300;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 2rem;
  }

  /* ── MOCK PAGE BEHIND ── */
  .mock-page {
    position: fixed;
    inset: 0;
    background: var(--black);
    display: flex;
    flex-direction: column;
    gap: 0;
    pointer-events: none;
    overflow: hidden;
  }
  .mock-nav {
    height: 64px;
    background: rgba(10,10,11,0.92);
    border-bottom: 1px solid rgba(255,255,255,0.05);
    display: flex;
    align-items: center;
    padding: 0 3rem;
    gap: 2.5rem;
  }
  .mock-logo { font-family: 'Unbounded', sans-serif; font-size: 0.9rem; }
  .mock-logo span:first-child { color: #c8c8d0; font-weight: 400; }
  .mock-logo span:last-child  { color: var(--accent); font-weight: 300; }
  .mock-nav-links { display: flex; gap: 2rem; margin-left: auto; }
  .mock-nav-link  { font-family: 'Unbounded', sans-serif; font-size: 0.55rem; color: #727280; letter-spacing: 0.04em; }
  .mock-hero {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 1rem;
    opacity: 0.18;
  }
  .mock-h1 { font-family: 'Big Shoulders Display', sans-serif; font-size: clamp(2.5rem, 6vw, 5rem); font-weight: 900; text-transform: uppercase; text-align: center; letter-spacing: -0.01em; line-height: 1; }
  .mock-sub { font-family: 'Barlow', sans-serif; font-size: 1rem; color: var(--grey-pale); }

  /* ── CHAT WIDGET ── */
  .chat-widget {
    position: fixed;
    bottom: 2rem;
    left: 2rem;
    z-index: 999;
    display: flex;
    flex-direction: column;
    align-items: flex-start;
    gap: 0.75rem;
  }

  /* collapsed bubble */
  .chat-bubble {
    width: 52px;
    height: 52px;
    border-radius: 50%;
    background: var(--accent);
    border: none;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    box-shadow: 0 4px 24px rgba(69,170,193,0.35);
    transition: transform 0.2s ease, box-shadow 0.2s ease;
    flex-shrink: 0;
  }
  .chat-bubble:hover {
    transform: scale(1.08);
    box-shadow: 0 6px 32px rgba(69,170,193,0.5);
  }
  .chat-bubble svg { width: 22px; height: 22px; fill: #fff; transition: opacity 0.2s; }
  .chat-bubble .icon-close { display: none; }
  .chat-widget.open .chat-bubble .icon-chat  { display: none; }
  .chat-widget.open .chat-bubble .icon-close { display: block; }

  /* panel */
  .chat-panel {
    width: 360px;
    max-height: 540px;
    background: var(--grey-dark);
    border: 1px solid rgba(255,255,255,0.07);
    border-radius: 16px;
    display: flex;
    flex-direction: column;
    overflow: hidden;
    box-shadow: 0 16px 48px rgba(0,0,0,0.5), 0 0 0 1px rgba(69,170,193,0.08);
    transform-origin: bottom left;
    transform: scale(0.85) translateY(12px);
    opacity: 0;
    pointer-events: none;
    transition: transform 0.25s cubic-bezier(0.34,1.56,0.64,1), opacity 0.2s ease;
  }
  .chat-widget.open .chat-panel {
    transform: scale(1) translateY(0);
    opacity: 1;
    pointer-events: all;
  }

  /* header */
  .chat-header {
    padding: 1rem 1.2rem 0.9rem;
    background: rgba(69,170,193,0.08);
    border-bottom: 1px solid rgba(255,255,255,0.06);
    display: flex;
    align-items: center;
    gap: 0.75rem;
    flex-shrink: 0;
  }
  .chat-avatar {
    width: 34px;
    height: 34px;
    border-radius: 50%;
    background: var(--accent);
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
  }
  .chat-avatar svg { width: 16px; height: 16px; fill: #fff; }
  .chat-header-info { flex: 1; }
  .chat-header-name {
    font-family: 'Unbounded', sans-serif;
    font-size: 0.6rem;
    font-weight: 400;
    color: var(--white);
    letter-spacing: 0.03em;
  }
  .chat-header-status {
    font-size: 0.68rem;
    color: var(--accent);
    display: flex;
    align-items: center;
    gap: 0.3rem;
    margin-top: 0.15rem;
  }
  .status-dot {
    width: 6px; height: 6px;
    border-radius: 50%;
    background: var(--accent);
    animation: pulse-dot 2s ease infinite;
  }
  @keyframes pulse-dot {
    0%,100% { opacity: 1; } 50% { opacity: 0.35; }
  }

  /* messages */
  .chat-messages {
    flex: 1;
    overflow-y: auto;
    padding: 1rem 1rem 0.5rem;
    display: flex;
    flex-direction: column;
    gap: 0.75rem;
    scrollbar-width: thin;
    scrollbar-color: var(--grey-mid) transparent;
  }
  .chat-messages::-webkit-scrollbar { width: 4px; }
  .chat-messages::-webkit-scrollbar-thumb { background: var(--grey-mid); border-radius: 4px; }

  .msg { display: flex; gap: 0.5rem; max-width: 100%; }
  .msg.user { flex-direction: row-reverse; }

  .msg-bubble {
    padding: 0.6rem 0.85rem;
    border-radius: 12px;
    font-size: 0.82rem;
    line-height: 1.55;
    max-width: 82%;
    word-break: break-word;
  }
  .msg.bot  .msg-bubble { background: #2f2f33; color: var(--white); border-bottom-left-radius: 3px; }
  .msg.user .msg-bubble { background: var(--accent); color: #fff; border-bottom-right-radius: 3px; }

  .msg-avatar {
    width: 26px; height: 26px;
    border-radius: 50%;
    background: var(--accent);
    flex-shrink: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    margin-top: auto;
  }
  .msg-avatar svg { width: 12px; height: 12px; fill: #fff; }
  .msg.user .msg-avatar { background: #444448; }

  /* typing indicator */
  .typing { display: flex; align-items: center; gap: 4px; padding: 0.5rem 0 0.2rem 2.2rem; }
  .typing span {
    width: 5px; height: 5px;
    border-radius: 50%;
    background: var(--grey-pale);
    animation: typing-bounce 1.2s ease infinite;
  }
  .typing span:nth-child(2) { animation-delay: 0.2s; }
  .typing span:nth-child(3) { animation-delay: 0.4s; }
  @keyframes typing-bounce {
    0%,60%,100% { transform: translateY(0); opacity: 0.4; }
    30% { transform: translateY(-5px); opacity: 1; }
  }

  /* quick replies */
  .quick-replies {
    padding: 0.5rem 1rem 0.75rem;
    display: flex;
    flex-direction: column;
    gap: 0.4rem;
    flex-shrink: 0;
  }
  .quick-reply {
    padding: 0.32rem 0.7rem;
    border-radius: 20px;
    border: 1px solid rgba(69,170,193,0.35);
    background: transparent;
    color: var(--accent);
    font-family: 'Barlow', sans-serif;
    font-size: 0.72rem;
    cursor: pointer;
    transition: background 0.18s, color 0.18s;
    white-space: nowrap;
  }
  .quick-reply:hover { background: var(--accent-dim); }

  /* input */
  .chat-input-row {
    padding: 0.75rem 1rem;
    border-top: 1px solid rgba(255,255,255,0.06);
    display: flex;
    gap: 0.5rem;
    align-items: center;
    flex-shrink: 0;
    background: rgba(10,10,11,0.4);
  }
  .chat-input {
    flex: 1;
    background: rgba(255,255,255,0.05);
    border: 1px solid rgba(255,255,255,0.08);
    border-radius: 8px;
    padding: 0.5rem 0.75rem;
    color: var(--white);
    font-family: 'Barlow', sans-serif;
    font-size: 0.82rem;
    font-weight: 300;
    outline: none;
    transition: border-color 0.2s;
    resize: none;
    height: 38px;
    line-height: 1.4;
  }
  .chat-input:focus { border-color: rgba(69,170,193,0.4); }
  .chat-input::placeholder { color: #727280; }
  .chat-send {
    width: 36px; height: 36px;
    border-radius: 8px;
    background: var(--accent);
    border: none;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
    transition: background 0.18s, transform 0.15s;
  }
  .chat-send:hover { background: #3d99ae; transform: scale(1.06); }
  .chat-send:disabled { background: #3a3a3e; cursor: not-allowed; transform: none; }
  .chat-send svg { width: 15px; height: 15px; fill: #fff; }

  /* label above */
  .chat-label {
    font-family: 'Unbounded', sans-serif;
    font-size: 0.52rem;
    color: var(--grey-pale);
    letter-spacing: 0.06em;
    padding-left: 0.2rem;
    opacity: 0;
    transform: translateY(4px);
    transition: opacity 0.3s ease 0.15s, transform 0.3s ease 0.15s;
  }
  .chat-widget.open .chat-label { opacity: 1; transform: translateY(0); }

  /* ── INLINE FORM ── */
  .chat-form {
    background: rgba(255,255,255,0.03);
    border: 1px solid rgba(69,170,193,0.2);
    border-radius: 12px;
    padding: 1rem;
    display: flex;
    flex-direction: column;
    gap: 0.55rem;
    margin-top: 0.25rem;
  }
  .chat-form-title {
    font-family: 'Unbounded', sans-serif;
    font-size: 0.55rem;
    color: var(--accent);
    letter-spacing: 0.06em;
    margin-bottom: 0.1rem;
  }
  .chat-form input,
  .chat-form textarea {
    background: rgba(255,255,255,0.05);
    border: 1px solid rgba(255,255,255,0.08);
    border-radius: 7px;
    padding: 0.45rem 0.7rem;
    color: var(--white);
    font-family: 'Barlow', sans-serif;
    font-size: 0.78rem;
    font-weight: 300;
    outline: none;
    width: 100%;
    transition: border-color 0.2s;
  }
  .chat-form input:focus,
  .chat-form textarea:focus { border-color: rgba(69,170,193,0.45); }
  .chat-form input::placeholder,
  .chat-form textarea::placeholder { color: #727280; }
  .chat-form textarea { resize: none; height: 68px; }
  .chat-form-submit {
    background: var(--accent);
    border: none;
    border-radius: 7px;
    padding: 0.5rem;
    color: #fff;
    font-family: 'Unbounded', sans-serif;
    font-size: 0.55rem;
    font-weight: 400;
    letter-spacing: 0.04em;
    cursor: pointer;
    transition: background 0.18s;
  }
  .chat-form-submit:hover { background: #3d99ae; }
  .chat-form-submit:disabled { background: #444; cursor: not-allowed; }
  .form-success {
    text-align: center;
    color: var(--accent);
    font-size: 0.78rem;
    padding: 0.5rem 0;
  }

  .msg-bubble { display: flex; flex-direction: column; gap: 0.28rem; }
  .chat-list-item {
    display: flex;
    gap: 0.45rem;
    align-items: baseline;
    line-height: 1.4;
  }
  .chat-list-num {
    color: var(--accent);
    font-family: 'Unbounded', sans-serif;
    font-size: 0.6rem;
    flex-shrink: 0;
    margin-top: 0.05rem;
  }

  .chat-reset {
    background: transparent;
    border: 1px solid rgba(255,255,255,0.08);
    border-radius: 7px;
    width: 32px;
    height: 32px;
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    flex-shrink: 0;
    transition: background 0.18s, border-color 0.18s;
  }
  .chat-reset:hover { background: rgba(255,80,80,0.1); border-color: rgba(255,80,80,0.3); }
  .chat-reset:hover svg { fill: #ff6b6b; }
  .chat-reset svg { width: 15px; height: 15px; fill: #727280; transition: fill 0.18s; }

  .msg.form-row {
    display: block;
    max-width: 100%;
    padding: 0 0.25rem;
  }
  .msg.form-row .chat-form {
    width: 100%;
  }
</style>
</head>
<body>

<!-- mock page behind -->
<div class="mock-page">
  <div class="mock-nav">
    <div class="mock-logo"><span>Grey</span><span>veil</span></div>
    <div class="mock-nav-links">
      <span class="mock-nav-link">Services</span>
      <span class="mock-nav-link">About</span>
      <span class="mock-nav-link">Pricing</span>
      <span class="mock-nav-link">Knowledge</span>
      <span class="mock-nav-link">Contact</span>
    </div>
  </div>
  <div class="mock-hero">
    <div class="mock-h1">Cybersecurity<br>Built for Africa.</div>
    <div class="mock-sub">Nairobi-based. World-class protection.</div>
  </div>
</div>

<!-- chat widget -->
<div class="chat-widget" id="widget">
  <div class="chat-panel" id="panel">

    <div class="chat-header">
      <div class="chat-avatar">
        <svg viewBox="0 0 24 24"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-1 14H9V8h2v8zm4 0h-2V8h2v8z"/></svg>
      </div>
      <div class="chat-header-info">
        <div class="chat-header-name">Greyveil AI Assistant</div>
        <div class="chat-header-status"><span class="status-dot"></span> Online · Typically replies instantly</div>
      </div>
      <button class="chat-reset" onclick="resetChat()" title="End conversation">
        <svg viewBox="0 0 24 24"><path d="M17 7l-1.41 1.41L18.17 11H8v2h10.17l-2.58 2.58L17 17l5-5-5-5zM4 5h8V3H4c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h8v-2H4V5z"/></svg>
      </button>
    </div>

    <div class="chat-messages" id="messages"></div>

    <div class="quick-replies" id="quick-replies">
      <button class="quick-reply" onclick="sendQuick('What services do you offer?')">Services</button>
      <button class="quick-reply" onclick="sendQuick('How much does a pentest cost?')">Pricing</button>
      <button class="quick-reply" onclick="sendQuick('How do I get started?')">Get started</button>
      <button class="quick-reply" onclick="sendQuick('Do you serve companies outside Kenya?')">Coverage</button>
      <button class="quick-reply" onclick="sendQuick('I want to get a quote')">Get a quote</button>
    </div>

    <div class="chat-input-row">
      <input class="chat-input" id="input" type="text" placeholder="Ask about our services…" autocomplete="off"/>
      <button class="chat-send" id="send-btn" onclick="sendMessage()">
        <svg viewBox="0 0 24 24"><path d="M2 21l21-9L2 3v7l15 2-15 2z"/></svg>
      </button>
    </div>
  </div>

  <span class="chat-label">ASK GREYVEIL</span>

  <button class="chat-bubble" id="bubble" onclick="toggleChat()" aria-label="Open chat">
    <!-- chat icon -->
    <svg class="icon-chat" viewBox="0 0 24 24"><path d="M20 2H4c-1.1 0-2 .9-2 2v18l4-4h14c1.1 0 2-.9 2-2V4c0-1.1-.9-2-2-2z"/></svg>
    <!-- close icon -->
    <svg class="icon-close" viewBox="0 0 24 24"><path d="M19 6.41L17.59 5 12 10.59 6.41 5 5 6.41 10.59 12 5 17.59 6.41 19 12 13.41 17.59 19 19 17.59 13.41 12z"/></svg>
  </button>
</div>

<script>
const SYSTEM_PROMPT = `You are the AI assistant for Greyveil Technologies, a cybersecurity and IT firm based in Nairobi, Kenya. You are embedded as a chat widget on their website.

Your personality: professional, knowledgeable, warm, and concise. You speak like a trusted security expert — never robotic, never salesy.

About Greyveil Technologies:
- Founded by Collins Gichuki, based in Nairobi, Kenya
- Phone: +254 741 733 851
- Services: Penetration Testing, Managed Security (SOC), Security Audits & Compliance, Cybersecurity Consulting, Software Engineering, Website Development, IT Support & Management, Security Awareness Training
- They serve Kenyan and African businesses with global-standard security
- Pricing is custom/quote-based (no fixed prices — direct prospects to contact for a quote)
- 100+ clients, 0 breaches on monitored clients, 24/7 SOC coverage

Guidelines:
- Keep answers VERY SHORT — 1–2 sentences max, under 40 words. Be direct. No filler, no preamble.
- Always end with a soft call to action when relevant
- When the user wants to get a quote, book a consultation, get in touch, or contact the team — first list the services as a short numbered list and ask which they're interested in. Once they pick a service (or say "all" or "not sure"), then respond with a short message and output exactly this token on its own line: [SHOW_FORM]
- If asked for pricing, explain it's bespoke and offer to help them get a quote
- If asked something outside your knowledge, say so honestly and offer to connect them with the team
- Never make up certifications, case studies, or client names
- Never reveal that you are Claude, built by Anthropic, or any underlying AI model. If asked who or what you are, say you are Greyveil's AI Assistant — nothing more.
- Use plain language — avoid jargon unless the user uses it first
- You can respond in Swahili if the user writes in Swahili`;

let history = [];
let isOpen = false;

function toggleChat() {
  isOpen = !isOpen;
  document.getElementById('widget').classList.toggle('open', isOpen);
  if (isOpen && history.length === 0) {
    setTimeout(() => addBotMessage("Hi there 👋 I'm Greyveil's AI assistant. Ask me anything about our cybersecurity services, or how we can help protect your business."), 400);
  }
}

function addMessage(role, text, showForm = false) {
  const msgs = document.getElementById('messages');
  const div  = document.createElement('div');
  div.className = `msg ${role}`;

  const avatarSvg = role === 'bot'
    ? `<svg viewBox="0 0 24 24"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-1 14H9V8h2v8zm4 0h-2V8h2v8z"/></svg>`
    : `<svg viewBox="0 0 24 24"><path d="M12 12c2.7 0 4.8-2.1 4.8-4.8S14.7 2.4 12 2.4 7.2 4.5 7.2 7.2 9.3 12 12 12zm0 2.4c-3.2 0-9.6 1.6-9.6 4.8v2.4h19.2v-2.4c0-3.2-6.4-4.8-9.6-4.8z"/></svg>`;

  const bubble = document.createElement('div');
  bubble.className = 'msg-bubble';
  // render numbered/bullet lists as HTML
  const formatted = text
    .split('\n')
    .map(line => {
      const num = line.match(/^(\d+)\. (.+)/);
      if (num) return `<span class="chat-list-item"><span class="chat-list-num">${num[1]}.</span> ${num[2]}</span>`;
      const bul = line.match(/^[-•] (.+)/);
      if (bul) return `<span class="chat-list-item"><span class="chat-list-num">—</span> ${bul[1]}</span>`;
      return line ? `<span>${line}</span>` : '';
    })
    .filter(Boolean)
    .join('');
  bubble.innerHTML = formatted;

  div.innerHTML = `<div class="msg-avatar">${avatarSvg}</div>`;
  div.appendChild(bubble);

  if (showForm) {
    setTimeout(() => {
      const formRow = document.createElement('div');
      formRow.className = 'msg bot form-row';
      formRow.appendChild(renderForm());
      msgs.appendChild(formRow);
      msgs.scrollTop = msgs.scrollHeight;
    }, 350);
  }

  msgs.appendChild(div);
  msgs.scrollTop = msgs.scrollHeight;
}

function addBotMessage(rawText) {
  const hasForm = rawText.includes('[SHOW_FORM]');
  const text    = rawText.replace('[SHOW_FORM]', '').trim();
  history.push({ role: 'assistant', content: text });
  addMessage('bot', text, hasForm);
}

function renderForm() {
  const form = document.createElement('div');
  form.className = 'chat-form';
  form.innerHTML = `
    <div class="chat-form-title">SEND US A MESSAGE</div>
    <input type="text"  id="cf-name"  placeholder="Your name"         />
    <input type="email" id="cf-email" placeholder="Email address"     />
    <input type="tel"   id="cf-phone" placeholder="Phone (optional)"  />
    <textarea           id="cf-msg"   placeholder="How can we help?"></textarea>
    <button class="chat-form-submit" id="cf-submit" onclick="submitForm()">SEND MESSAGE →</button>
  `;
  return form;
}

async function submitForm() {
  const name  = document.getElementById('cf-name').value.trim();
  const email = document.getElementById('cf-email').value.trim();
  const phone = document.getElementById('cf-phone').value.trim();
  const msg   = document.getElementById('cf-msg').value.trim();
  if (!name || !email) { alert('Please enter your name and email.'); return; }

  const btn = document.getElementById('cf-submit');
  btn.disabled = true;
  btn.textContent = 'SENDING…';

  try {
    await fetch('https://formspree.io/f/xnjgpvvz', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', 'Accept': 'application/json' },
      body: JSON.stringify({ name, email, phone, message: msg, source: 'Chatbot' })
    });
    btn.closest('.chat-form').innerHTML = `<div class="form-success">✓ Message sent! We'll be in touch shortly.</div>`;
    addBotMessage("Got it! The team will reach out to you soon. Anything else I can help with?");
  } catch {
    btn.disabled = false;
    btn.textContent = 'SEND MESSAGE →';
    addBotMessage("Hmm, something went wrong. Please try calling us directly at +254 741 733 851.");
  }
}

function showTyping() {
  const msgs = document.getElementById('messages');
  const div  = document.createElement('div');
  div.id = 'typing';
  div.className = 'typing';
  div.innerHTML = '<span></span><span></span><span></span>';
  msgs.appendChild(div);
  msgs.scrollTop = msgs.scrollHeight;
}

function removeTyping() {
  const t = document.getElementById('typing');
  if (t) t.remove();
}

async function sendMessage() {
  const input = document.getElementById('input');
  const text  = input.value.trim();
  if (!text) return;

  // hide quick replies after first message
  document.getElementById('quick-replies').style.display = 'none';

  input.value = '';
  addMessage('user', text);
  history.push({ role: 'user', content: text });

  document.getElementById('send-btn').disabled = true;
  showTyping();

  try {
    const res = await fetch('/.netlify/functions/chat', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        system:   SYSTEM_PROMPT,
        messages: history.filter(m => m.role !== 'assistant' || history.indexOf(m) > 0)
      })
    });

    const data = await res.json();
    removeTyping();

    const reply = data.content?.[0]?.text || "Sorry, I couldn't get a response right now. Please try again or call us at +254 741 733 851.";
    addBotMessage(reply);

  } catch (err) {
    removeTyping();
    addBotMessage("I'm having trouble connecting right now. Please reach us directly at +254 741 733 851 or via the contact form.");
  }

  document.getElementById('send-btn').disabled = false;
  document.getElementById('input').focus();
}

function sendQuick(text) {
  document.getElementById('input').value = text;
  sendMessage();
}

document.getElementById('input').addEventListener('keydown', e => {
  if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); }
});


function resetChat() {
  history = [];
  isOpen  = false;

  // clear messages
  document.getElementById('messages').innerHTML = '';

  // restore quick replies
  const qr = document.getElementById('quick-replies');
  qr.style.display = '';

  // clear input
  document.getElementById('input').value = '';
  document.getElementById('send-btn').disabled = false;

  // close panel
  document.getElementById('widget').classList.remove('open');

  // reopen fresh after short pause
  setTimeout(() => toggleChat(), 320);
}

// open on load after short delay so user sees it
setTimeout(() => toggleChat(), 800);
</script>
</body>
</html>
