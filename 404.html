<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>404 — Page Not Found | Greyveil Technologies</title>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;600&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='0.9em' font-size='90' fill='%237eb8c4'>G</text></svg>"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --black: #0a0a0b; --grey-dark: #141416; --grey-mid: #2a2a2e;
      --grey-pale: #9a9aa4; --silver: #c8c8d0; --white: #f4f4f6; --accent: #7eb8c4;
    }
    html { scroll-behavior: smooth; }
    body {
      background: var(--black); color: var(--white);
      font-family: 'DM Sans', sans-serif; font-weight: 300;
      min-height: 100vh; display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      text-align: center; padding: 2rem; overflow: hidden;
    }
    body::before {
      content: ''; position: fixed; inset: 0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.04'/%3E%3C/svg%3E");
      pointer-events: none; z-index: 0; opacity: 0.4;
    }
    .wrap { position: relative; z-index: 1; max-width: 560px; animation: fadeUp 0.9s ease forwards; opacity: 0; }
    @keyframes fadeUp { from { opacity:0; transform:translateY(24px); } to { opacity:1; transform:translateY(0); } }
    .logo { font-family: 'Cormorant Garamond', serif; font-size: 1.3rem; font-weight: 600; letter-spacing: 0.08em; text-decoration: none; display: inline-flex; align-items: center; margin-bottom: 3.5rem; }
    .logo-grey { color: var(--silver); }
    .logo-veil { color: var(--accent); }
    .logo-dot  { color: var(--accent); opacity: 0.5; margin: 0 1px; }
    .logo-tech { color: var(--grey-pale); font-weight: 300; font-size: 0.9rem; letter-spacing: 0.18em; text-transform: uppercase; margin-left: 5px; }
    .code {
      font-family: 'Cormorant Garamond', serif;
      font-size: clamp(5rem, 18vw, 9rem);
      font-weight: 600; line-height: 1;
      color: var(--grey-mid); margin-bottom: 1.5rem;
      position: relative; display: inline-block;
    }
    .code span { color: var(--accent); }
    .label {
      font-size: 0.72rem; letter-spacing: 0.22em; text-transform: uppercase;
      color: var(--accent); display: flex; align-items: center; justify-content: center;
      gap: 0.7rem; margin-bottom: 1.2rem;
    }
    .label::before, .label::after { content: ''; display: block; width: 24px; height: 1px; background: var(--accent); }
    h1 { font-family: 'Cormorant Garamond', serif; font-size: clamp(1.6rem, 4vw, 2.4rem); font-weight: 300; color: var(--white); line-height: 1.2; margin-bottom: 1rem; }
    p { font-size: 0.94rem; color: var(--grey-pale); line-height: 1.8; margin-bottom: 2.4rem; }
    .actions { display: flex; gap: 1rem; justify-content: center; flex-wrap: wrap; }
    .btn-primary {
      background: var(--accent); color: var(--black); border: none;
      padding: 0.85rem 2.2rem; font-family: 'DM Sans', sans-serif;
      font-size: 0.82rem; font-weight: 500; letter-spacing: 0.1em;
      text-transform: uppercase; text-decoration: none; transition: background 0.25s; display: inline-block;
    }
    .btn-primary:hover { background: var(--white); }
    .btn-outline {
      background: transparent; border: 1px solid rgba(255,255,255,0.15);
      color: var(--grey-pale); padding: 0.85rem 2.2rem;
      font-family: 'DM Sans', sans-serif; font-size: 0.82rem;
      letter-spacing: 0.1em; text-transform: uppercase;
      text-decoration: none; transition: all 0.25s; display: inline-block;
    }
    .btn-outline:hover { border-color: var(--white); color: var(--white); }
    canvas { position: fixed; inset: 0; width: 100%; height: 100%; pointer-events: none; z-index: 0; }
  </style>
</head>
<body>
  <canvas id="c"></canvas>
  <div class="wrap">
    <a href="index.html" class="logo">
      <span class="logo-grey">Grey</span><span class="logo-veil">veil</span><span class="logo-dot">·</span><span class="logo-tech">Tech.</span>
    </a>
    <div class="code">4<span>0</span>4</div>
    <div class="label">Page Not Found</div>
    <h1>You've wandered into<br>the grey area.</h1>
    <p>The page you're looking for doesn't exist, has moved, or was never there to begin with. Let's get you back on solid ground.</p>
    <div class="actions">
      <a href="index.html" class="btn-primary">Back to Home</a>
      <a href="assets/contact.html" class="btn-outline">Contact Us</a>
    </div>
  </div>

  <script>
    // Constellation background
    const canvas = document.getElementById('c');
    const ctx = canvas.getContext('2d');
    let W, H, stars = [];
    function resize() { W = canvas.width = window.innerWidth; H = canvas.height = window.innerHeight; }
    resize(); window.addEventListener('resize', () => { resize(); init(); });
    function init() {
      stars = Array.from({ length: 70 }, () => ({
        x: Math.random()*W, y: Math.random()*H,
        vx: (Math.random()-0.5)*0.18, vy: (Math.random()-0.5)*0.18,
        r: 0.5+Math.random()*1.2, a: 0.2+Math.random()*0.4,
        t: Math.random()*Math.PI*2
      }));
    }
    init();
    let tick = 0;
    function loop() {
      tick++;
      ctx.clearRect(0,0,W,H);
      for (const s of stars) {
        s.x += s.vx; s.y += s.vy;
        if (s.x < -10) s.x = W+10; if (s.x > W+10) s.x = -10;
        if (s.y < -10) s.y = H+10; if (s.y > H+10) s.y = -10;
        const tw = 0.7+0.3*Math.sin(tick*0.012+s.t);
        ctx.beginPath(); ctx.arc(s.x, s.y, s.r, 0, Math.PI*2);
        ctx.fillStyle = `rgba(200,205,215,${(s.a*tw).toFixed(3)})`; ctx.fill();
      }
      for (let i=0;i<stars.length;i++) for (let j=i+1;j<stars.length;j++) {
        const d = Math.hypot(stars[i].x-stars[j].x, stars[i].y-stars[j].y);
        if (d>120) continue;
        ctx.beginPath(); ctx.moveTo(stars[i].x,stars[i].y); ctx.lineTo(stars[j].x,stars[j].y);
        ctx.strokeStyle=`rgba(180,185,200,${((1-d/120)*0.055).toFixed(3)})`; ctx.lineWidth=0.5; ctx.stroke();
      }
      const g = ctx.createRadialGradient(W/2,H/2,H*0.05,W/2,H/2,H*0.82);
      g.addColorStop(0,'rgba(10,10,11,0)'); g.addColorStop(1,'rgba(10,10,11,0.92)');
      ctx.fillStyle=g; ctx.fillRect(0,0,W,H);
      requestAnimationFrame(loop);
    }
    loop();
  </script>
</body>
</html>
